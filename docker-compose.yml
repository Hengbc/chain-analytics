version: '3.8'
services:
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla-db
    ports:
      - "9042:9042"
    environment:
      - CLUSTER_NAME=chain-analytics
    volumes:
      - scylla-data:/var/lib/scylla

  backend:
    build: ./backend
    container_name: chain-backend
    ports:
      - "8000:8000"
    depends_on:
      - scylla
    environment:
      - SCYLLA_HOST=scylla
      - SCYLLA_PORT=9042
    volumes:
      - ./scripts:/app/scripts

  frontend:
    build: ./eth-dashboard-analysis
    container_name: chain-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  scylla-data: